<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>SnacksDhaba</title>
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
	<style>
     * {
     	margin: 0;
     	padding: 0;
     	box-sizing: border-box;
     }	

     body {
     	border: 2px solid black;
     	background: url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092") no-repeat center center;
     	background-size: cover;
     	position: relative;
     	min-height: 100vh;
     	display: flex;
     	flex-direction: column;
     }

     .overlay {
      position: fixed;
      z-index: 1;
      width: 100%;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
    }

     .content {
     	flex: 1;
     	color: white;
		display: flex;
		flex-direction: column;
		justify-content: center;
		align-items: center;
     	gap: 20px;
     	text-align: center;
     	position: relative;
     	z-index: 2;
     }

     h1 {
     	min-width: 0;
     	word-wrap: break-word;
     	overflow-wrap: break-word;
     	font-size: clamp(1.8rem, 5vw, 3.2rem);
     	font-weight: bold;
     	color: #f5e6c8; /* soft gold-cream */
        text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        background: linear-gradient(to right,yellow,green );
	    -webkit-background-clip: text;
	    -webkit-text-fill-color: transparent;
	    letter-spacing: 3px;
	    line-height: 1.2;
     }

     p {
     	font-size: clamp(1rem, 2.5vw, 1.5rem);
     }

     .content a{
     	text-decoration: none;
     	color: white;
     	word-wrap: break-word;
     	overflow-wrap: break-word;
     	min-width: 0;
     	background-color: #dc3545;
     	border: none;
     	border-radius: 50px;
     	padding: 12px 30px;
     	cursor: pointer;
     	font-size: clamp(1rem, 4vw, 1.5rem);
     }

     .content a:hover {
     	background-color: #bb2d3b;
     }

     .navbar {
 	    display: flex;
 	    justify-content: space-between;
 	    align-items: center;
 	    padding: 20px 40px;
 	    position: relative;
 	    z-index: 10;
 	    color: white;
     	    /*background-color: lightskyblue;*/
     }

      .navbar a{
     	text-decoration: none;
     	color: white;
     }

     .login {
     	background-color: #6f42c1;
     	padding: 10px 26px;
     	border: none;
     	border-radius: 50px;
     }

     .signup {
     	background-color: orange;
     	padding: 10px 26px;
     	border: none;
     	border-radius: 50px;
     }

	 .logo {
	    font-size: clamp(18px, 6vw, 28px);
	    font-weight: bold;
	    background: linear-gradient(45deg, orange, red);
	    -webkit-background-clip: text;
	    -webkit-text-fill-color: transparent;
	    letter-spacing: 2px;
	    font-family: 'Playfair Display', serif;
	    text-transform: uppercase;
	    text-decoration: none;
	 }

	 @media (max-width: 768px){
	 	.navbar {
	 		flex-direction: column;
	 		text-align: center;
	 		gap: 20px;
	 	}
	 }

 	 @media (max-width: 280px){
 	 	.goto {
 	 		display: flex;
 	 		flex-direction: column;
 	 		gap: 10px;
 	 	}
	 }
	</style>
</head>
<body>
	<div class="overlay"></div>
	<nav class="navbar">
		<a href="#" class="logo">SnacksDhaba</a>

		<div class="goto">
			<a href="customer_login.php" class="login">LogIn</a>
			<a href="customer_signup.php" class="signup">SignUp</a>
		</div>
	</nav>
	<div class="content">
		<h1>Welcome To SnacksDhaba</h1>
		<p>Order your favourite snacks from anywhere......</p>
		<a href="index.php"> Explore Menu</a>
	</div>
</body>
</html>
